apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "tronvent.fullname" . }}-test-connection"
  labels:
    {{- include "tronvent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['-qO-', 'http://{{ include "tronvent.fullname" . }}:{{ .Values.service.port }}/health']
  restartPolicy: Never
