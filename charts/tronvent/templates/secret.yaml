{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tronvent.fullname" . }}
  labels:
    {{- include "tronvent.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "secrets.databaseUrl is required when secrets.create=true and no existingSecret is set" .Values.secrets.databaseUrl | quote }}
  TRONGRID_API_KEY_SCANNER: {{ required "secrets.tronGridApiKey is required when secrets.create=true and no existingSecret is set" .Values.secrets.tronGridApiKey | quote }}
  {{- if .Values.secrets.adminApiToken }}
  ADMIN_API_TOKEN: {{ .Values.secrets.adminApiToken | quote }}
  {{- end }}
  {{- if .Values.secrets.webhookSigningSecret }}
  WEBHOOK_SIGNING_SECRET: {{ .Values.secrets.webhookSigningSecret | quote }}
  {{- end }}
{{- end }}
