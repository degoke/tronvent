# Default values for tronvent — Tron blockchain scanner (Postgres-backed).

replicaCount: 1

image:
  repository: ghcr.io/degoke/tronvent
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1001

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tronvent.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Non-secret application configuration (rendered into a ConfigMap).
config:
  logLevel: INFO
  logFormat: json
  healthPort: "8080"
  tronGridBaseUrl: https://api.trongrid.io
  pollIntervalMs: "3000"
  startBlock: "0"
  requiredConfirmations: "20"
  trc20EventConfs: "10"
  trc20CursorRetain: "50"
  trc20EventRetries: "3"
  trc20EventRetryDelayMs: "2000"
  fetchConcurrency: "5"
  httpTimeoutSeconds: "60"
  reconcileBatchSize: "1000"
  trc20Contracts: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"
  webhookUrl: ""
  webhookMaxAttempts: "8"
  webhookPollIntervalMs: "1000"
  webhookHttpTimeoutSeconds: "30"
  stateResyncIntervalSeconds: "60"

# Secrets — prefer existingSecret (pre-created in the cluster) for production.
secrets:
  create: true
  existingSecret: ""
  databaseUrl: ""
  tronGridApiKey: ""
  adminApiToken: ""
  webhookSigningSecret: ""

# Extra env vars appended to the container.
extraEnv: []

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 75

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

migration:
  enabled: false
  image: ""
  tag: ""

nodeSelector: {}
tolerations: []
affinity: {}
